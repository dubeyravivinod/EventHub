<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event.title }}</title>
    <style>
        :root {
            --bg: #f7f1e8;
            --panel: #fffaf3;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e7d8c6;
            --accent: #b45309;
            --accent-dark: #92400e;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at top, #fff5e7 0%, var(--bg) 55%, #efe2d2 100%);
            color: var(--text);
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 20px 64px;
        }

        .card {
            background: rgba(255, 250, 243, 0.95);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 22px 50px rgba(73, 44, 17, 0.10);
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--accent);
            font-size: 0.8rem;
            margin: 0 0 12px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            line-height: 1;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0 24px;
        }

        .pill {
            display: inline-flex;
            border-radius: 999px;
            padding: 7px 12px;
            background: #f3e8d8;
            color: #7c2d12;
            font-size: 0.88rem;
            font-weight: 700;
        }

        .pill.status-upcoming { background: #d1fae5; color: #065f46; }
        .pill.status-ongoing { background: #dbeafe; color: #1d4ed8; }
        .pill.status-cancelled { background: #fee2e2; color: #b91c1c; }
        .pill.status-completed { background: #e5e7eb; color: #374151; }

        .section {
            padding: 18px 0;
            border-top: 1px solid var(--border);
        }

        .label {
            margin: 0 0 6px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.78rem;
            font-weight: 700;
        }

        p {
            margin: 0;
            line-height: 1.7;
            color: var(--text);
        }

        .muted {
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 12px 18px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid var(--accent);
            color: white;
            background: var(--accent);
        }

        .button.secondary {
            color: var(--accent-dark);
            background: transparent;
        }

        .button:hover {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
            color: white;
        }
    </style>
</head>
<body>
    <main class="page">
        <article class="card">
            <p class="eyebrow">Event details</p>
            <h1>{{ event.title }}</h1>

            <div class="meta">
                <span class="pill">{{ event.date|date:"M d, Y · H:i" }}</span>
                <span class="pill status-{{ event.status }}">{{ event.get_status_display }}</span>
                <span class="pill">{{ event.location }}</span>
            </div>

            <div class="section">
                <p class="label">Description</p>
                <p>{{ event.description }}</p>
            </div>

            <div class="section">
                <p class="label">Location</p>
                <p class="muted">{{ event.location }}</p>
            </div>

            <div class="actions">
                <a class="button" href="{% url 'event:event_update' event.pk %}">Edit event</a>
                <a class="button secondary" href="{% url 'event:event_list' %}">Back to events</a>
            </div>
        </article>
    </main>
</body>
</html>
