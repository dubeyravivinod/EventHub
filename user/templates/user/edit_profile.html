<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Edit profile</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#fafafa;color:#111;margin:0;padding:24px}
    .card{max-width:760px;margin:24px auto;padding:20px;border-radius:10px;background:#fff;border:1px solid #eee}
    .actions{margin-top:18px}
    button, a.button{display:inline-block;padding:10px 14px;border-radius:8px;background:#036;color:#fff;border:none;text-decoration:none}
    a.button.secondary{background:transparent;color:#036;border:1px solid #036}
    label{font-weight:700;margin-bottom:6px;display:block}
    input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Edit profile</h1>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.non_field_errors }}

      {% for field in form %}
        <div style="margin-top:12px">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div style="color:#b91c1c">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <div class="actions">
        <button type="submit">Save</button>
        <a class="button secondary" href="{% url 'user:profile' %}">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>
