<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;background:#f7fafc;color:#111;margin:0;padding:24px}.card{max-width:420px;margin:40px auto;padding:20px;border-radius:10px;background:#fff;border:1px solid #eee}label{display:block;margin-bottom:6px;font-weight:700}input{width:100%;padding:10px;border-radius:6px;border:1px solid #ddd;margin-bottom:12px}button{background:#036;color:#fff;border:none;padding:10px 14px;border-radius:6px}a.link{color:#036;text-decoration:none;display:inline-block;margin-top:12px}</style>
</head>
<body>
  <main class="card">
    <h1>Login</h1>
    {% if messages %}
      {% for message in messages %}
        <div style="color:#b91c1c">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="username">Username</label>
      <input name="username" id="username" required>
      <label for="password">Password</label>
      <input name="password" id="password" type="password" required>
      <button type="submit">Sign in</button>
    </form>
    <a class="link" href="{% url 'user:register' %}">Create account</a>
  </main>
</body>
</html>
