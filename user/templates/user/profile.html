<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>User profile</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#fbfbfb;color:#111;margin:0;padding:24px}
    .card{max-width:820px;margin:24px auto;padding:20px;border-radius:10px;background:#fff;border:1px solid #eee}
    img.avatar{width:110px;height:110px;border-radius:999px;object-fit:cover;margin-right:18px}
    .meta{display:flex;align-items:center}
    .actions{margin-top:18px}
    a.button{display:inline-block;padding:10px 14px;border-radius:8px;background:#036; color:#fff;text-decoration:none}
    a.link{color:#036;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="meta">
      {% if profile.avatar %}
        <img class="avatar" src="{{ profile.avatar.url }}" alt="{{ profile.user.username }}">
      {% endif %}
      <div>
        <h1>{{ profile.user.get_full_name|default:profile.user.username }}</h1>
        <p style="color:#666;margin:6px 0">@{{ profile.user.username }}</p>
      </div>
    </div>

    <section style="margin-top:18px">
      <h3>About</h3>
      <p>{{ profile.bio }}</p>
    </section>

    <div class="actions">
      <a class="button" href="{% url 'user:edit_profile' %}">Edit profile</a>
      <a class="link" href="{% url 'user:user_list' %}" style="margin-left:12px">All users</a>
    </div>
  </main>
</body>
</html>
