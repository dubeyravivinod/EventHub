<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;background:#f7fafc;color:#111;margin:0;padding:24px}.card{max-width:520px;margin:40px auto;padding:20px;border-radius:10px;background:#fff;border:1px solid #eee}label{display:block;margin-bottom:6px;font-weight:700}input{width:100%;padding:10px;border-radius:6px;border:1px solid #ddd;margin-bottom:12px}button{background:#036;color:#fff;border:none;padding:10px 14px;border-radius:6px}a.link{color:#036;text-decoration:none;display:inline-block;margin-top:12px}.errors{color:#b91c1c;margin-bottom:12px}</style>
</head>
<body>
  <main class="card">
    <h1>Create account</h1>
    <form method="post">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="errors">{{ form.non_field_errors }}</div>
      {% endif %}
      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="errors">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <div>
        <label for="email">Email (optional)</label>
        <input id="email" name="email" type="email">
      </div>

      <div style="margin-top:12px">
        <button type="submit">Create account</button>
        <a class="link" href="{% url 'user:login' %}" style="margin-left:12px">Sign in</a>
      </div>
    </form>
  </main>
</body>
</html>
