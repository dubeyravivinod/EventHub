<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Users</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#fbfbfb;color:#111;margin:0;padding:24px}
    .wrap{max-width:960px;margin:12px auto}
    .list{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px}
    .item{padding:12px;border-bottom:1px solid #f0f0f0}
    .item:last-child{border-bottom:0}
    a.link{color:#036;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Users</h1>
    <div class="list">
      {% for profile in profiles %}
        <div class="item">
          <a class="link" href="{% url 'user:user_detail' profile.pk %}">{{ profile.user.get_full_name|default:profile.user.username }}</a>
          <div style="color:#666">@{{ profile.user.username }}</div>
        </div>
      {% empty %}
        <div class="item">No users found.</div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
